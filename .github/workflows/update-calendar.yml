name: Update T1 Calendar

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Generate calendar
        run: npm run generate

      - name: Commit calendar file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update T1 calendar
          file_pattern: t1.ics
